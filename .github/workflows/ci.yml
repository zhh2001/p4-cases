name: ci

# p4-cases CI: compile every case's P4 source and build every case's
# Go controller. Live mininet / BMv2 tests require root + kernel
# namespaces + Docker-style privileges that github-hosted runners do
# not grant by default, so they are NOT run here — they are covered by
# `sudo ./run.sh` locally on any Ubuntu 24.04+ machine.
#
# What CI catches:
#   * P4 source compile errors (new case broken, or existing case
#     regressed by a shared header change).
#   * Go controller source compile errors (SDK upgrade broke an API
#     we use, a controller imports something missing, etc.).
#   * go mod tidy drift.
#   * Shell-script lint on run.sh / run_helpers.sh.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  P4C_IMAGE: "p4lang/p4c:latest"
  CASES: "01_packet_reflector 02_repeater 03_l2_forwarding_switch 04_l2_broadcast_switch 05_l2_learning_switch 06_int 07_meter 08_counter 09_ecmp_hash 10_firewall_acl 11_vxlan_encap 12_register_flow_counter 13_clone_to_cpu"

jobs:
  p4-compile:
    name: compile P4 (${{ matrix.case }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - 01_packet_reflector
          - 02_repeater
          - 03_l2_forwarding_switch
          - 04_l2_broadcast_switch
          - 05_l2_learning_switch   # compiles main_digest.p4
          - 06_int
          - 07_meter                # compiles indirect_meter.p4
          - 08_counter              # compiles indirect_counter.p4
          - 09_ecmp_hash
          - 10_firewall_acl
          - 11_vxlan_encap
          - 12_register_flow_counter
          - 13_clone_to_cpu
    container: p4lang/p4c:latest
    steps:
      - uses: actions/checkout@v4
      - name: locate P4 source
        id: src
        shell: bash
        run: |
          case_dir="${{ matrix.case }}"
          if   [[ -f "$case_dir/main.p4" ]]; then src="$case_dir/main.p4"
          elif [[ -f "$case_dir/main_digest.p4" ]]; then src="$case_dir/main_digest.p4"
          elif [[ -f "$case_dir/indirect_meter.p4" ]]; then src="$case_dir/indirect_meter.p4"
          elif [[ -f "$case_dir/indirect_counter.p4" ]]; then src="$case_dir/indirect_counter.p4"
          else
            echo "::error::no P4 source for $case_dir"; exit 1
          fi
          echo "src=$src" >> "$GITHUB_OUTPUT"
          echo "Will compile $src"
      - name: p4c
        shell: bash
        run: |
          mkdir -p build
          p4c -b bmv2 --target bmv2 --arch v1model --std p4-16 \
              --p4runtime-files build/${{ matrix.case }}.p4info.txt \
              -o build \
              ${{ steps.src.outputs.src }}
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p4-${{ matrix.case }}
          path: build/
          retention-days: 7

  go-build:
    name: go build controllers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: go vet
        run: go vet ./...
      - name: go build every controller
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          for case_dir in ${{ env.CASES }}; do
            if [[ -d "$case_dir/controller" ]]; then
              echo "::group::$case_dir"
              go build -o "bin/$case_dir" "./$case_dir/controller"
              echo "::endgroup::"
            fi
          done
          ls -la bin/

  shellcheck:
    name: shellcheck run.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for f in common/run_helpers.sh */run.sh; do
            echo "::group::$f"
            shellcheck -x "$f" || failed=1
            echo "::endgroup::"
          done
          exit "$failed"
