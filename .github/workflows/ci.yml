name: ci

# p4-cases CI: compile every case's P4 source and build every case's
# Go controller. Live mininet / BMv2 tests require root + kernel
# namespaces + Docker-style privileges that github-hosted runners do
# not grant by default, so they are NOT run here — they are covered
# by `sudo ./run.sh` locally on any Ubuntu 24.04+ machine.
#
# What CI catches:
#   * P4 source compile errors.
#   * Go controller source compile errors / tidy drift.
#   * run.sh / run_helpers.sh lint regressions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CASES: "01_packet_reflector 02_repeater 03_l2_forwarding_switch 04_l2_broadcast_switch 05_l2_learning_switch 06_int 07_meter 08_counter 09_ecmp_hash 10_firewall_acl 11_vxlan_encap 12_register_flow_counter 13_clone_to_cpu"

jobs:
  p4-compile:
    name: compile all P4 sources
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      # Install p4c from the p4lang OBS repo. More reliable than the
      # p4lang/p4c Docker image which has been shipping missing boost
      # libraries, and faster than building from source.
      - name: install p4c (p4lang OBS)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ca-certificates gnupg
          curl -fsSL "https://download.opensuse.org/repositories/home:/p4lang/xUbuntu_22.04/Release.key" \
              | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/home_p4lang.gpg >/dev/null
          echo 'deb http://download.opensuse.org/repositories/home:/p4lang/xUbuntu_22.04/ /' \
              | sudo tee /etc/apt/sources.list.d/home-p4lang.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y p4lang-p4c
          p4c --version

      - name: compile every P4 source
        shell: bash
        run: |
          set -euo pipefail
          for case_dir in ${{ env.CASES }}; do
            if   [[ -f "$case_dir/main.p4" ]]; then src="$case_dir/main.p4"
            elif [[ -f "$case_dir/main_digest.p4" ]]; then src="$case_dir/main_digest.p4"
            elif [[ -f "$case_dir/indirect_meter.p4" ]]; then src="$case_dir/indirect_meter.p4"
            elif [[ -f "$case_dir/indirect_counter.p4" ]]; then src="$case_dir/indirect_counter.p4"
            else echo "::error::no P4 source in $case_dir"; exit 1; fi

            echo "::group::$case_dir ($(basename "$src"))"
            mkdir -p "build/$case_dir"
            p4c -b bmv2 --target bmv2 --arch v1model --std p4-16 \
                --p4runtime-files "build/$case_dir/p4info.txt" \
                -o "build/$case_dir" \
                "$src"
            echo "::endgroup::"
          done
          echo "All P4 sources compiled."

      - name: upload P4 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: p4-artifacts
          path: build/
          retention-days: 7

  go-build:
    name: go build controllers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: go vet
        run: go vet ./...
      - name: go build every controller
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          for case_dir in ${{ env.CASES }}; do
            if [[ -d "$case_dir/controller" ]]; then
              echo "::group::$case_dir"
              go build -o "bin/$case_dir" "./$case_dir/controller"
              echo "::endgroup::"
            fi
          done
          ls -la bin/

  shellcheck:
    name: shellcheck run.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for f in common/run_helpers.sh */run.sh; do
            echo "::group::$f"
            shellcheck -x "$f" || failed=1
            echo "::endgroup::"
          done
          exit "$failed"
